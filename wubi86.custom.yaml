# 五笔 86 定制
# 中文输入(半角)模式下,/ 键直接输出顿号「、」
# 反查: z -> pinyin_simp, ` -> luna_pinyin
# 作者: handaoliang

patch:
  "schema/name": "五笔"
  schema/dependencies:
    - pinyin_simp
    - luna_pinyin

  switches:
    - name: ascii_mode
      reset: 0
      states: [ 中文, 英文 ]
    - name: full_shape
      states: [ 半角, 全角 ]
    - name: simplification
      reset: 1
      states: [ 漢字, 汉字 ]
    - name: ascii_punct
      states: [ 。，, ．， ]

  punctuator/half_shape/+:
    "/": "、"
    " ": "　"

  # 启用用户词典: 动态学习字词频(选词次数多的字会自动排到前面)
  # schema 内置的 encode_commit_history + enable_encoder 配合本项可实现自动造词
  "translator/enable_user_dict": true

  engine/filters:
    # - lua_filter@single_char_first_filter
    - simplifier
    - uniquifier

  # processors: 智能空格(根据上一个上屏内容决定半角/全角)
  # lua_processor 必须放在 punctuator 之前才能拦截空格
  # english_sentence 须放在 ascii_composer 之前,否则 Shift 键会先被
  # ascii_composer 处理,导致 input 提前上屏
  engine/processors:
    - lua_processor@english_sentence
    - ascii_composer
    - recognizer
    - key_binder
    - lua_processor@smart_space
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor

  # 关键: 加上 matcher,让自定义 tag (reverse_lookup2) 能被识别为独立的输入段
  engine/segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor

  engine/translators:
    - punct_translator
    - reverse_lookup_translator
    - reverse_lookup_translator@reverse_lookup2
    - lua_translator@date_translator
    - table_translator

  "recognizer/patterns/reverse_lookup": "^z[a-z]*'?$"
  "recognizer/patterns/reverse_lookup2": "^`[a-z]*'?$"
  # uppercase 段允许的字符: 字母数字 + 空格 + 所有可打印 ASCII 标点
  # 允许小写字母前置(如 iMac / nA / GitHub),只要 input 中包含大写字母即触发
  # 配合 english_sentence.lua 实现"包含大写字母触发英文句子累积输入"
  "recognizer/patterns/uppercase": "[a-zA-Z]*[A-Z][- _+.'0-9A-Za-z,;:!?\"()/@#&*$%^_={}|~<>`\\\\\\[\\]]*$"

  # z 触发: 用 pinyin_simp 反查
  reverse_lookup:
    dictionary: pinyin_simp
    prefix: "z"
    suffix: "'"
    tips: 〔简单拼音〕
    preedit_format:
      - xform/([nl])v/$1ü/
      - xform/([nl])ue/$1üe/
      - xform/([jqxy])v/$1u/

  # ` 触发: 用 luna_pinyin 反查
  reverse_lookup2:
    tag: reverse_lookup2
    dictionary: luna_pinyin
    enable_user_dict: false
    prefix: "`"
    suffix: "'"
    tips: 〔正常拼音〕
    preedit_format:
      - xform/([nl])v/$1ü/
      - xform/([nl])ue/$1üe/
      - xform/([jqxy])v/$1u/
    comment_format:
      - xform/([nl])v/$1ü/
      - xform/([nl])ue/$1üe/
