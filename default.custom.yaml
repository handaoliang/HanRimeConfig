  recognizer:
    patterns:  # 一些常见的英文组合，当正则匹配到这些时，都不会生成候选词，而只输入英文
      email: "^[-_.0-9A-Za-z]+@.*$"
      # 这个已经通过english_sentence.lua处理掉了。
      # uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
      url: "^(www[.]|https?:|ftp[.:]|mailto:|file:|localhost).*$|^[a-z]+[.].+$"
      # special_chars: "[a-zA-Z][._+\\-$'\"`~!@#%^&*=|\\\\/:;,?()\\[\\]{}<>]*$"
      # special_chars: "[a-zA-Z][0-9A-Za-z._+\\-$'\"`~!@#%^&*=|\\\\/:;,?()\\[\\]{}<>]*$"
      special_chars: "^[A-Za-z][0-9A-Za-z._+\\-$'\"`~!@#%^&*=|\\\\/:;,?()\\[\\]{}<>]*[._+\\-$'\"`~!@#%^&*=|\\\\/:;,?()\\[\\]{}<>][0-9A-Za-z._+\\-$'\"`~!@#%^&*=|\\\\/:;,?()\\[\\]{}<>]*$"
