# Squirrel 全局配置定制
# 作者: handaoliang
# 使用方法:覆盖 ~/Library/Rime/default.custom.yaml 后重新部署

patch:
  # 候选词每页数量
  menu:
    page_size: 9

  # 启用的输入方案
  schema_list:
    - schema: wubi86_jidian             # 五笔
    - schema: rime_ice                  # 雾凇拼音（全拼）
    # - schema: wubi86                    # 五笔86版（官方）
    # - schema: luna_pinyin_simp          # 朙月拼音（官方）
    - schema: numbers                   # 大写数字
    - schema: wubi86_jidian_pinyin      # 五笔拼音混输
    - schema: wubi86_jidian_trad        # 五笔 - 简入繁出
    - schema: wubi86_jidian_trad_pinyin # 五笔拼音混输 - 简入繁出
    # - schema: pinyin_simp               # 普通拼音

  switcher/caption: "〔选择输入法〕"

  #-----------------------------------------------
  # 中英文切换自定义
  #-----------------------------------------------
  # inline_ascii  在输入法的临时英文编辑区内输入字母，数字，符号，空格等，回车上屏后自动复位到中文
  # commit_text   已输入的候选文字上屏并切换至英文输入模式
  # commit_code   已输入的编码字符上屏并切换至英文输入模式
  # -----------------------------------------------
  # 参考链接： https://gist.github.com/lotem/2981316

  # ===========================================================
  # ASCII 模式切换:只允许「右 Shift」切换中英文
  # ===========================================================
  # good_old_caps_lock: true 表示按下时直接切换状态(而非长按)
  # 左 Shift 设为 noop(无操作),只有右 Shift 才切换 ascii_mode
  ascii_composer/good_old_caps_lock: true
  ascii_composer/switch_key:
    Shift_L: noop                       # 左 Shift 不切换
    Shift_R: commit_code                # 右 Shift 切换中英文,并上屏当前输入
    # Shift_R: noop                # 右 Shift 切换中英文,并上屏当前输入
    Control_L: noop
    Control_R: noop
    # 建议在 macOS 系统设置中将 Caps Lock 设为「切换输入法/切换 ABC」,体验更顺手
    Caps_Lock: noop                     # CapsLock 交给 macOS 系统处理
    Eisu_toggle: clear

  # macOS 的 Command 键在 Rime 中通常写作 Super；若系统占用了 Command+Space,
  # 需要先在 macOS 键盘快捷键设置里释放该组合键，Squirrel 才能收到。
  # 不行，拿不到 Command+Space 组合键，这三行配置保留，留个念想吧，后面看看有没有机会用上。
  key_binder/bindings/+:
    - { when: always, accept: Super+space, toggle: ascii_mode }
    - { when: always, accept: Meta+space, toggle: ascii_mode }

  # 中英文之间自动补半角空格；设为 false 可关闭 english_sentence 与 pangu_spacing_filter 的补空格行为
  pangu_spacing:
    enabled: false

