# Squirrel 鼠须管 - MiniMindX 主题
# 横向排列候选词
# 作者: handaoliang
# 使用方法:将此文件放入 ~/Library/Rime/ 目录,然后在「鼠须管设定」中应用配置

patch:
  # 应用 MiniMindX 主题
  "style/color_scheme": HanDouNormal
  "style/color_scheme_dark": HanDouNormal

  # 横向排列
  "style/horizontal": true

  # 候选词布局
  "style/candidate_list_layout": linear
  "style/text_orientation": horizontal

  # 待转字母不嵌入目标程序,由输入法窗口显示
  "style/inline_preedit": false

  # inline_preedit:false 时,组字区在宿主程序里的占位下划线(定制版前端功能)
  # half=半角空格(默认,下划线更短) | full=全角空格(中文基线稳) | none=不显示
  "style/preedit_placeholder": half

  # 消除掉输入的字母后面的^这个符号
  "style/caret_symbol": ""

  # 字体设置 - Yahei Mono 优先,回落到苹方与 Menlo
  "style/font_face": "Yahei Mono, PingFangSC, HelveticaNeue, Menlo"
  "style/font_point": 16
  "style/label_font_face": "Yahei Mono, PingFangSC, HelveticaNeue, Menlo"
  "style/label_font_point": 16
  "style/comment_font_face": "Yahei Mono, PingFangSC, HelveticaNeue, Menlo"
  "style/comment_font_point": 16
  # 输入码(preedit)单独字号 - 与候选词保持一致,避免高亮块垂直错位
  "style/preedit_font_face": "Yahei Mono, PingFangSC, HelveticaNeue, Menlo"
  "style/preedit_font_point": 18

  # 候选词标签样式:序号 + 点 + 窄空格(U+2005, 1/6 em),让点和候选字更近
  "style/label_format": "%s.\u2005"
  # 候选词排版:label 与候选词紧贴(label_format 已含尾部空格)
  "style/candidate_format": "%c.\u2005%@"

  # 边距与圆角
  "style/corner_radius": 6
  "style/hilited_corner_radius": 6    # 高亮块圆角(也间接决定高亮块视觉高度)
  "style/border_height": 6           # 面板上下内边距
  "style/border_width": 12            # 面板左右内边距
  "style/line_spacing": 0             # 候选行不加额外底距,避免高亮块偏顶
  "style/spacing": 2                  # 候选词之间间距
  "style/candidate_left_padding": 10  # 候选区右移,与 preedit 前的〔方案名〕对齐(定制版前端功能)
  "style/base_offset": 0
  "style/shadow_size": 0

  # 配色方案定义
  # 注意:Squirrel 颜色使用 BGR 格式;支持透明度时为 0xAABBGGRR(AA=透明度)
  preset_color_schemes:
    HanDouNormal:
      name: "HanDouNormal"
      author: "HanDaoLiang"

      # 主背景与边框
      back_color: 0x272822              # 背景 RGB #282923 → BGR 0x272822
      border_color: 0x272822            # 边框与背景一致

      # 输入码区域(待转字母,显示在输入法窗口顶部)
      text_color: 0x1964FC              # 输入码 RGB #FC6419 → BGR 0x1964FC
      hilited_text_color: 0x1964FC      # 已确认的输入码同色
      hilited_back_color: 0x272822      # 输入码背景与面板一致

      # 候选词通用颜色
      candidate_text_color: 0xF8F8F2    # 候选词文本 米白 RGB #F2F8F8

      # 首选项(高亮的第一个候选)
      hilited_candidate_text_color: 0x116CFF      # 首选文字 RGB #FF6C11 → BGR 0x116CFF
      hilited_candidate_back_color: 0x00272822    # 完全透明,不显示高亮块
      hilited_candidate_label_color: 0x116CFF     # 首选序号同色
      hilited_comment_text_color: 0x116CFF        # 首选注释同色

      # 非首选候选词的序号与注释
      label_color: 0x5E7175             # MiniMindX 灰 RGB #75715E → BGR 0x5E7175
      comment_text_color: 0x5E7175      # 注释颜色一致

    HanDouLight:
      name: "HanDouLight"
      font_face: "Helvetica"
      font_point: 15.0
      candidate_list_layout: linear
      text_orientation: horizontal
      inline_preedit: false
      translucency: true
      mutual_exclusive: true
      corner_radius: 15.0
      hilited_corner_radius: 13.0
      border_height: -5.0
      border_width: -5.0
      line_spacing: 4.0
      spacing: 10.0
      alpha: 60.0
      shadow_size: 1.0
      color_space: display_p3
      back_color: 0x1AFFFFFF
      candidate_text_color: 0xB3000000
      comment_text_color: 0x80333333
      label_color: 0xBB333333
      hilited_candidate_back_color: 0x7DC6C6C6
      hilited_candidate_text_color: 0x000000
      hilited_comment_text_color: 0xBF333333
      hilited_candidate_label_color: 0x000000
      preedit_back_color: 0x1A000000
      text_color: 0xBF323232
      hilited_text_color: 0xBF1A1A1A

    HanDouDark:
      name: "HanDouDark"
      author: "HanDaoLiang"
      font_face: "Helvetica"
      font_point: 15.0
      candidate_list_layout: linear
      text_orientation: horizontal
      inline_preedit: false
      translucency: true
      mutual_exclusive: true
      corner_radius: 15.0
      hilited_corner_radius: 13.0
      border_height: -5.0
      border_width: -5.0
      line_spacing: 4.0
      spacing: 10.0
      alpha: 60.0
      shadow_size: 1.0
      color_space: display_p3
      # 颜色格式:0xAABBGGRR (AA=Alpha 透明度, BB=蓝, GG=绿, RR=红)
      # MiniMindX 深色配色:纯黑背景(完全不透明)
      back_color: 0x000000            # 纯黑背景,100% 不透明
      # 输入码区域 - 橙色 #FC6419
      text_color: 0x1964FC            # 输入码 75% 不透明
      hilited_text_color: 0x1964FC    # 已确认输入码同色
      hilited_back_color: 0x000000    # 输入码背景与面板一致(纯黑不透明)
      preedit_back_color: 0x000000    # 预编辑背景(对应 Light 的同名值)
      # 候选词通用 - 米白 #F8F8F2
      candidate_text_color: 0xFFFFFF
      # 首选项 - 橙色 #FF6C11
      hilited_candidate_back_color: 0x222222
      hilited_candidate_text_color: 0x116CFF
      hilited_comment_text_color: 0x116CFF
      hilited_candidate_label_color: 0x116CFF
      # 非首选序号与注释 - 灰 #75715E
      label_color: 0x5E7175
      comment_text_color: 0x5E7175

    roseo_maple:
      name: 玫枫 / Roseo Maple
      # v1.00 之后新增  ------ start  -----
      candidate_format: "[label]. [candidate] [comment]"   # 候选词格式， label:序号，candidate：候选词，comment: 词条注释
      candidate_list_layout: linear                        # stacked | linear
      text_orientation: horizontal                         # horizontal | vertical
      # v0.18 新增 ------ start  -----
      status_message_type: mix # long | short | mix
      memorize_size: true # 控制选项标是否在接触屏幕边缘时有粘性
      # ----------------  end  -------

      alpha: 1.0                                # 候选窗口透明度：符点型数据，小数点形式，不然出错无法正常显示皮肤，0 时隐藏候选框
      border_height: 0                          # 边距宽度 - 上下
      border_width: 0                           # 边框宽度 - 左右， 两者同时存在时才显示边框
      border_color: 0xffffff                    # 边框颜色
      back_color: 0xF4F4F6                      # 背景颜色 - 面板
      corner_radius: 5                          # 候选框圆角大小

      font_point: 18                            # 字体大小 - 候选
#      font_face: PingFang SC Semibold           # 字体 - 候选文字

      line_spacing: 5                          # horizontal 为 false 时，上下候选的间隔大小
      base_offset: 0                           # 文字基线调整
      preedit_back_color: 0x364572

      hilited_corner_radius: 5                  # 圆角大小 - 高亮候选词
      hilited_candidate_text_color: 0x4F11FA    # 字体颜色 - 高亮候选词
      hilited_candidate_back_color: 0xEDEDF9    # 背景颜色 - 高亮候选词  8位的前两位是颜色透明度，00就是透明，FF就是不透明
      hilited_candidate_label_color: 0x884F11FA # 字体颜色 - 高亮候选词

      label_font_face: PingFang SC              # 字体    - 序号
      label_font_point: 17                      # 字体大小 - 序号
      label_color: 0xaaaaaa                     # 字体颜色 - 序号

      candidate_text_color: 0x222222            # 字体颜色 - 候选词
      candidate_font_face: PingFang SC          # 字体    - 候选词
      candidate_font_point: 16                  # 字体大小 - 候选词

      comment_font_face: PingFang SC            # 字体    - 注释
      comment_font_point: 16                    # 字体大小 - 注释
      comment_text_color: 0x5AC461              # 字体颜色 - 注释

      inline_preedit: true                      # 输入的编码是否直接写入到输入框中，如果为 false，未上屏的编码就会写在候选框中
      spacing: 5                                # 当 inline_preedit 为 false 时，编码会出现在候选面板中，该值控制编码与候选词之间的距离
      # inline_preedit 为 false 时
      hilited_text_color: 0x8E8E93              # 颜色 - 输入中 - 编码
      hilited_back_color: 0xEFEFF4              # 颜色 - 输入中 - 背景

    roseo_maple_dark:
      name: 玫枫-暗黑 / Roseo Maple Dark
      candidate_format: "[label]. [candidate] [comment]"   # 候选词格式， label:序号，candidate：候选词，comment: 词条注释
      candidate_list_layout: linear                        # stacked | linear
      text_orientation: horizontal                         # horizontal | vertical
      status_message_type: mix # long | short | mix
      memorize_size: true # 控制选项标是否在接触屏幕边缘时有粘性

      alpha: 1.0                                # 候选窗口透明度：符点型数据，小数点形式，不然出错无法正常显示皮肤，0 时隐藏候选框
      border_height: 1                          # 边框宽度-上下
      border_width: 1                           # 边框宽度-左右， 两者同时存在时才显示边框
      border_color: 0x444444                    # 边框颜色
      back_color: 0x333333                      # 背景颜色 - 面板
      corner_radius: 5                          # 候选框圆角大小

      font_point: 18                            # 字体大小 - 候选
      line_spacing: 5                          # horizontal 为 false 时，上下候选的间隔大小
      base_offset: 0                           # 文字基线调整
      preedit_back_color: 0x364572

      hilited_corner_radius: 5                  # 圆角大小 - 高亮候选词
      hilited_candidate_text_color: 0xffffff    # 字体颜色 - 高亮候选词
      hilited_candidate_back_color: 0x00ffffff    # 背景颜色 - 高亮候选词  8位的前两位是颜色透明度，00就是透明，FF就是不透明
      hilited_candidate_label_color: 0x5AC461 # 字体颜色 - 高亮候选词

      label_font_face: PingFang SC              # 字体    - 序号
      label_font_point: 17                      # 字体大小 - 序号
      label_color: 0x77ffffff                     # 字体颜色 - 序号

      candidate_text_color: 0x99ffffff            # 字体颜色 - 候选词ggtt
      candidate_font_face: PingFang SC          # 字体    - 候选词
      candidate_font_point: 16                  # 字体大小 - 候选词

      comment_font_face: PingFang SC            # 字体    - 注释
      comment_font_point: 16                    # 字体大小 - 注释
      comment_text_color: 0x5AC461              # 字体颜色 - 注释

      inline_preedit: true                      # 输入的编码是否直接写入到输入框中，如果为 false，未上屏的编码就会写在候选框中
      spacing: 5                                # 当 inline_preedit 为 false 时，编码会出现在候选面板中，该值控制编码与候选词之间的距离
      # inline_preedit 为 false 时
      hilited_text_color: 0x8E8E93              # 颜色 - 输入中 - 编码
      hilited_back_color: 0xEFEFF4              # 颜色 - 输入中 - 背景

# --- 特定程序定义初始状态的英文输入 ---
  app_options:
    com.termius-dmg.mac: # Terminal - Mac
      ascii_mode: true
#    com.google.Chrome: # Chrome
#      ascii_mode: true
#    com.coderforart.MWeb3: # MWeb
#      ascii_mode: true
#    com.apple.Safari: # Safari
#      ascii_mode: true
#    co.zeit.hyper: # 程序名
#      ascii_mode: true # 对应的选项
